<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">

<title>ARISE — ADHD Optimized</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060810;color:#d8e8ff;font-family:'Exo 2',sans-serif;height:100vh;overflow:hidden}
:root{--bg:#060810;--bg2:#0d1018;--bg3:#131820;--bg4:#1a2030;--border:rgba(80,120,220,0.15);--accent:#4a7aff;--accent2:#7aaaff;--gold:#c8a84b;--gold2:#e8d080;--danger:#ff4a6e;--success:#3ddc84;--purple:#9060ff;--text:#d8e8ff;--text2:#8098c0;--text3:#405070}

/* ADHD-FRIENDLY ANIMATIONS */
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(360deg);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--gold)}50%{box-shadow:0 0 20px var(--gold)}}
@keyframes stampPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

.header{background:rgba(6,8,16,0.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:10px 14px 8px}
.header-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.player-left{display:flex;align-items:center;gap:10px}
.avatar{width:44px;height:44px;border-radius:50%;border:2px solid var(--gold);background:linear-gradient(135deg,var(--bg3),var(--bg4));display:flex;align-items:center;justify-content:center;font-size:22px}
.player-name{font-family:'Rajdhani';font-weight:700}
.player-rank{font-size:9px;color:var(--text3);font-family:'Share Tech Mono'}
.level-badge{font-family:'Rajdhani';font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;background:rgba(200,168,75,0.15);color:var(--gold2)}

/* XP DASHBOARD - VISUAL PROGRESS */
.xp-dashboard{background:linear-gradient(135deg,var(--bg3),var(--bg4));border-radius:16px;padding:12px;margin:8px 12px;border:1px solid var(--border)}
.stamp-track{display:flex;gap:6px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.stamp{width:36px;height:36px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s}
.stamp.earned{background:linear-gradient(135deg,var(--gold),#ffd700);color:#000;transform:scale(1.05);box-shadow:0 0 15px rgba(200,168,75,0.6);animation:stampPop 0.3s ease}
.xp-now{display:flex;align-items:baseline;justify-content:center;gap:5px;margin-bottom:8px}
.xp-big-number{font-family:'Rajdhani';font-size:48px;font-weight:800;color:var(--gold2);line-height:1}
.xp-goal{font-size:14px;color:var(--text3)}
.next-milestone{text-align:center;font-size:11px;color:var(--accent2);margin-top:8px;animation:pulse 1.5s infinite}
.progress-ring-container{display:flex;justify-content:center;margin-top:8px}
canvas#xpRing{width:70px;height:70px}

/* QUEST CARDS */
.quest-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.2s}
.quest-card:active{transform:scale(0.98)}
.quest-card.done{opacity:0.5}
.q-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px}
.quest-card.done .q-check{background:var(--success);border-color:var(--success);color:#000}
.q-body{flex:1}
.quest-name{font-size:14px;font-weight:500}
.q-xp{font-family:'Rajdhani';font-weight:700;color:var(--gold);font-size:16px}
.q-delete{color:var(--text3);cursor:pointer;padding:0 6px;opacity:0}
.quest-card:hover .q-delete{opacity:0.6}

/* COUNTDOWN TIMER */
.countdown-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column}
.countdown-number{font-family:'Rajdhani';font-size:120px;font-weight:800;color:var(--gold2);animation:pulse 0.5s infinite}
.countdown-cancel{position:absolute;bottom:100px;padding:12px 24px;background:var(--bg3);border:1px solid var(--border);border-radius:30px;cursor:pointer}

/* FLOATING XP */
.xp-float{position:fixed;z-index:2000;font-family:'Rajdhani';font-size:24px;font-weight:800;color:var(--gold2);pointer-events:none;animation:floatUp 0.8s ease-out forwards;text-shadow:0 0 10px rgba(200,168,75,0.5)}

/* BODY DOUBLE BAR */
.body-double-bar{background:rgba(74,122,255,0.1);padding:6px 12px;margin:0 12px 8px;border-radius:20px;text-align:center;font-size:11px;font-family:'Share Tech Mono';border:1px solid rgba(74,122,255,0.2)}

/* SCREW IT BUTTON */
.screw-it-btn{background:rgba(255,74,110,0.15);border:1px solid rgba(255,74,110,0.3);border-radius:20px;padding:4px 12px;font-size:10px;color:var(--danger);cursor:pointer;margin-left:8px}

/* STATS */
.stats-row{display:flex;gap:5px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
.stat-pill{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 8px;min-width:54px;text-align:center}
.stat-lbl{font-family:'Share Tech Mono';font-size:8px;color:var(--text3)}
.stat-val{font-family:'Rajdhani';font-size:14px;font-weight:700}

/* WEEKLY */
.weekly-bar-wrap{display:flex;gap:8px;align-items:center;padding:5px 12px;background:var(--bg2);border-bottom:1px solid var(--border)}
.weekly-track{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.weekly-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--accent));transition:width 0.3s}

/* PANELS */
.panel{display:none}
.panel.active{display:block}
.main-scroll{flex:1;overflow-y:auto;padding:12px}
.bottom-nav{display:flex;background:var(--bg2);border-top:1px solid var(--border)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;background:transparent;border:none;cursor:pointer}
.nav-btn.active{background:var(--bg3);border-top:1px solid var(--accent)}
.nav-icon{font-size:16px}
.nav-lbl{font-family:'Share Tech Mono';font-size:8px;color:var(--text3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:flex-end;opacity:0;pointer-events:none}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:18px 18px 0 0;padding:20px;width:100%;transform:translateY(100%);transition:transform 0.28s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal input,.modal select{width:100%;padding:10px;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:#fff;margin-bottom:10px}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 20px;font-size:12px;color:var(--gold2);z-index:600;opacity:0;transition:opacity 0.2s}
.toast.show{opacity:1}

/* REFLECTION */
.reflect-ta{width:100%;min-height:70px;padding:10px;background:var(--bg4);border:1px solid var(--border);border-radius:8px;color:#fff;margin-bottom:12px;resize:vertical}
.seal-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--purple));border:none;border-radius:12px;font-weight:700;color:#fff;cursor:pointer;font-size:16px}
.seal-btn:disabled{opacity:0.5}

/* LOGIN */
.login-overlay{position:fixed;inset:0;background:#060810;z-index:2000;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px;width:100%;max-width:360px}
.login-title{font-family:'Rajdhani';font-size:28px;font-weight:700;text-align:center;color:var(--accent);margin-bottom:24px}
.login-input{width:100%;height:44px;padding:0 14px;background:var(--bg4);border:1px solid var(--border);border-radius:10px;color:#fff;margin-bottom:12px}
.login-btn{width:100%;height:46px;background:var(--accent);border:none;border-radius:12px;font-weight:700;color:#fff;cursor:pointer}
.login-switch{text-align:center;margin-top:12px;font-size:12px;color:var(--text3);cursor:pointer}
.login-switch span{color:var(--accent)}

.empty-state{text-align:center;padding:30px;color:var(--text3);font-size:12px}
#syncDot{width:8px;height:8px;border-radius:50%;background:#ff9050;transition:all 0.3s}
#syncDot.synced{background:var(--success);box-shadow:0 0 8px var(--success)}
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <div class="login-title">ARISE</div>
    <input type="email" class="login-input" id="loginEmail" placeholder="Email">

<div id="app" style="display:none; height:100vh; display:flex; flex-direction:column">
  <div class="header">
    <div class="header-row1">
      <div class="player-left">
        <div class="avatar" id="avatar">⚔️</div>

  <!-- ADHD VISUAL XP DASHBOARD -->

      <textarea class="reflect-ta" id="reflection2" placeholder="What got in the way? No shame, just data."></textarea>

        <input type="password" id="geminiKeyInput" placeholder="Gemini API Key (optional)" style="width:100%; padding:10px; background:var(--bg4); border:1px solid var(--border); border-radius:8px; color:#fff; margin-bottom:12px">
        <button class="sec-action" onclick="saveGeminiKey()" style="width:100%; margin-bottom:12px">💾 Save API Key</button>
        <button class="sec-action" onclick="syncToCloud()" style="width:100%; margin-bottom:12px">☁️ Sync Now</button>
        <button class="sec-action" onclick="signOut()" style="width:100%; background:rgba(255,74,110,0.2); color:#ff4a6e">🚪 Sign Out</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" onclick="showPanel('quests',this)"><div class="nav-icon">⚔</div><div class="nav-lbl">QUESTS</div></button>
    <button class="nav-btn" onclick="showPanel('reflect',this)"><div class="nav-icon">📝</div><div class="nav-lbl">REFLECT</div></button>
    <button class="nav-btn" onclick="showPanel('settings',this)"><div class="nav-icon">⚙</div><div class="nav-lbl">SETTINGS</div></button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal"><div class="modal-title" id="modalTitle">Add Quest</div><div id="modalBody"></div><div class="modal-btns"><button class="m-cancel" onclick="closeModal()" style="background:var(--bg4); border:none; padding:10px; border-radius:8px; margin-right:8px">Cancel</button><button class="m-confirm" onclick="confirmModal()" style="background:var(--accent); border:none; padding:10px; border-radius:8px; color:#fff">Add</button></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// ARISE - ADHD OPTIMIZED - Complete Working Version
// Visual XP, Stamps, Instant Feedback, Body Double
// ============================================================

const SUPABASE_URL = 'https://ujyimzatxcwjepkrbktb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqeWltemF0eGN3amVwa3Jia3RiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDU4NDYsImV4cCI6MjA5MDg4MTg0Nn0.c-hty3mpc-l1FKUSYwHIRvi3_xsmnzZBHGnkbCUxACk';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// STATE
let currentUser = null;
let authMode = 'signin';
let S = {
  totalXP: 0, level: 1, streak: 0, playerName: 'SEEKER',
  stats: { Mind: 10, Discipline: 10, Body: 10, Awareness: 10, Strategy: 10 },
  quests: [],
  todayXP: 0,
  stamps: 0,
  lastSealDate: null,
  weeklyXP: 0, weeklyTarget: 500
};

let modalMode = '';
let activeCountdown = null;
let bodyDoubleInterval = null;

// ===== HELPERS =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function getToday() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

// ===== VISUAL XP SYSTEM =====
const XP_PER_STAMP = 50;
const DAILY_GOAL = 500;

function updateXPVisuals(xpGained, questElement) {
  S.todayXP += xpGained;
  S.weeklyXP += xpGained;
  
  // Floating XP number
  if (questElement) {
    const rect = questElement.getBoundingClientRect();
    const floatDiv = document.createElement('div');
    floatDiv.className = 'xp-float';
    floatDiv.textContent = `+${xpGained} XP`;
    floatDiv.style.left = rect.right - 40 + 'px';
    floatDiv.style.top = rect.top + 'px';
    document.body.appendChild(floatDiv);
    setTimeout(() => floatDiv.remove(), 800);
  }
  
  // Update number
  document.getElementById('todayXP').textContent = S.todayXP;
  
  // Update stamps
  const newStampCount = Math.floor(S.todayXP / XP_PER_STAMP);
  if (newStampCount > S.stamps) {
    for (let i = S.stamps; i < newStampCount; i++) {
      const stamps = document.querySelectorAll('.stamp');
      if (stamps[i]) {
        stamps[i].classList.add('earned');
        stamps[i].style.animation = 'stampPop 0.3s ease';
        setTimeout(() => { if(stamps[i]) stamps[i].style.animation = ''; }, 300);
        playSound('stamp');
        triggerMiniConfetti(stamps[i]);
      }
    }
    S.stamps = newStampCount;
    showToast(`⭐ STAMP EARNED! ${S.stamps}/10 stamps`);
    
    // Every 5 stamps = bonus
    if (S.stamps % 5 === 0 && S.stamps > 0) {
      triggerConfetti();
      S.todayXP += 50;
      document.getElementById('todayXP').textContent = S.todayXP;
      showToast(`🎉 ${S.stamps} STAMPS! +50 BONUS XP!`);
    }
  }
  
  // Update ring
  const pct = Math.min(100, (S.todayXP / DAILY_GOAL) * 100);
  drawProgressRing(pct);
  
  // Next milestone
  const nextStamp = (S.stamps + 1) * XP_PER_STAMP;
  const needed = Math.max(0, nextStamp - S.todayXP);
  document.getElementById('nextMilestone').innerHTML = needed > 0 ? `⚡ ${needed} more XP for next stamp!` : `🎯 ${DAILY_GOAL - S.todayXP} XP to daily goal!`;
  
  // Daily goal complete
  if (S.todayXP >= DAILY_GOAL && !window.dailyBonusClaimed) {
    window.dailyBonusClaimed = true;
    triggerConfetti();
    showToast('🏆 DAILY GOAL COMPLETE! +100 BONUS XP');
    S.todayXP += 100;
    document.getElementById('todayXP').textContent = S.todayXP;
    updateXPVisuals(0, null);
  }
  
  // Weekly update
  const weeklyPct = Math.min(100, (S.weeklyXP / S.weeklyTarget) * 100);
  document.getElementById('weeklyFill').style.width = `${weeklyPct}%`;
  document.getElementById('weeklyPct').textContent = `${Math.floor(S.weeklyXP)} / ${S.weeklyTarget} XP`;
  
  saveToLocal();
}

function drawProgressRing(percent) {
  const canvas = document.getElementById('xpRing');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const size = 70, center = 35, radius = 28;
  const start = -0.5 * Math.PI;
  const end = start + (percent / 100) * 2 * Math.PI;
  
  ctx.clearRect(0, 0, size, size);
  ctx.beginPath();
  ctx.arc(center, center, radius, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(80,120,220,0.2)';
  ctx.lineWidth = 5;
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(center, center, radius, start, end);
  ctx.strokeStyle = '#c8a84b';
  ctx.lineWidth = 5;
  ctx.stroke();
  
  ctx.font = 'bold 14px "Rajdhani"';
  ctx.fillStyle = '#e8d080';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${Math.floor(percent)}%`, center, center);
}

function renderStamps() {
  const container = document.getElementById('stampTrack');
  const stampCount = Math.floor(S.todayXP / XP_PER_STAMP);
  let html = '';
  for (let i = 0; i < 10; i++) {
    html += `<div class="stamp ${i < stampCount ? 'earned' : ''}">${i < stampCount ? '⭐' : '○'}</div>`;
  }
  container.innerHTML = html;
  S.stamps = stampCount;
}

// ===== SOUNDS (Web Audio) =====
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  document.addEventListener('click', () => { if(audioCtx?.state === 'suspended') audioCtx.resume(); }, { once: true });
}

function playSound(type) {
  if (!audioCtx) initAudio();
  if (audioCtx?.state !== 'running') return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.2, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
  
  if (type === 'stamp') { osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1046, now + 0.08); osc.stop(now + 0.15); }
  else if (type === 'complete') { osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.1); osc.stop(now + 0.25); }
  else if (type === 'levelup') { osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.12); osc.frequency.setValueAtTime(784, now + 0.24); osc.frequency.setValueAtTime(1046, now + 0.36); osc.stop(now + 0.5); }
  else if (type === 'click') { osc.frequency.setValueAtTime(440, now); osc.stop(now + 0.05); }
  else { osc.frequency.setValueAtTime(440, now); osc.stop(now + 0.1); }
  osc.start();
}

// ===== CONFETTI =====
function triggerMiniConfetti(element) {
  const rect = element.getBoundingClientRect();
  for (let i = 0; i < 8; i++) {
    const conf = document.createElement('div');
    conf.style.position = 'fixed';
    conf.style.left = rect.left + rect.width/2 + 'px';
    conf.style.top = rect.top + 'px';
    conf.style.width = '4px';
    conf.style.height = '4px';
    conf.style.background = `hsl(${Math.random() * 360}, 80%, 60%)`;
    conf.style.borderRadius = '50%';
    conf.style.pointerEvents = 'none';
    conf.style.animation = `fall ${Math.random() * 1 + 0.5}s linear forwards`;
    document.body.appendChild(conf);
    setTimeout(() => conf.remove(), 1000);
  }
}

function triggerConfetti() {
  for (let i = 0; i < 50; i++) {
    const conf = document.createElement('div');
    conf.style.position = 'fixed';
    conf.style.left = Math.random() * window.innerWidth + 'px';
    conf.style.top = '-10px';
    conf.style.width = '6px';
    conf.style.height = '6px';
    conf.style.background = `hsl(${Math.random() * 360}, 80%, 60%)`;
    conf.style.borderRadius = '50%';
    conf.style.pointerEvents = 'none';
    conf.style.animation = `fall ${Math.random() * 2 + 1}s linear forwards`;
    document.body.appendChild(conf);
    setTimeout(() => conf.remove(), 2000);
  }
  playSound('levelup');
}

// ===== 5-SECOND COUNTDOWN =====
function startCountdown(questId) {
  const quest = S.quests.find(q => q.id === questId);
  if (!quest) return;
  
  const overlay = document.createElement('div');
  overlay.className = 'countdown-overlay';
  overlay.innerHTML = `
    <div class="countdown-number" id="countdownNum">5</div>
    <div style="font-size:14px; color:var(--text2); margin-top:10px">Get ready...</div>
    <div class="countdown-cancel" onclick="this.parentElement.remove()">Cancel</div>
  `;
  document.body.appendChild(overlay);
  
  let count = 5;
  const interval = setInterval(() => {
    count--;
    const numDiv = document.getElementById('countdownNum');
    if (numDiv) numDiv.textContent = count;
    playSound('click');
    if (count <= 0) {
      clearInterval(interval);
      overlay.remove();
      completeQuest(quest.id);
    }
  }, 1000);
}

function completeQuest(questId) {
  const quest = S.quests.find(q => q.id === questId);
  if (!quest || quest.done) return;
  
  quest.done = true;
  const xpEarned = quest.xp;
  
  // Visual feedback
  updateXPVisuals(xpEarned, document.querySelector(`.quest-card[data-id="${questId}"]`));
  
  // Update stats
  if (quest.stats) {
    quest.stats.forEach(s => {
      if (S.stats[s.type]) S.stats[s.type] = Math.min(999, S.stats[s.type] + s.value);
    });
  }
  
  // Streak update (any daily quest = streak maintained)
  if (quest.type === 'daily') {
    const today = getToday();
    if (S.lastStreakDate !== today) {
      S.streak++;
      S.lastStreakDate = today;
      document.getElementById('streakPill').textContent = `🔥 ${S.streak} day streak`;
      showToast(`🔥 Streak: ${S.streak} days!`);
    }
  }
  
  renderQuests();
  renderStats();
  saveToLocal();
  syncToCloud();
  playSound('complete');
  showToast(`+${xpEarned} XP! ${quest.name} completed`);
}

// ===== SCREW IT - Partial Credit =====
function screwIt(questId) {
  const quest = S.quests.find(q => q.id === questId);
  if (!quest || quest.done) return;
  
  quest.done = true;
  const halfXP = Math.floor(quest.xp / 2);
  updateXPVisuals(halfXP, null);
  showToast(`✓ Good enough! +${halfXP} XP (half credit)`);
  
  renderQuests();
  saveToLocal();
}

// ===== RENDER QUESTS =====
function renderQuests() {
  const todaySealed = S.lastSealDate === getToday();
  const daily = S.quests.filter(q => q.type === 'daily');
  const other = S.quests.filter(q => q.type === 'main' || q.type === 'chaos');
  
  if (todaySealed) {
    document.getElementById('dailyQuests').innerHTML = '<div class="empty-state">✨ Day sealed! Come back tomorrow for new quests.</div>';
    document.getElementById('otherQuests').innerHTML = '<div class="empty-state">Complete reflection to unlock tomorrow\'s quests.</div>';
    return;
  }
  
  document.getElementById('dailyQuests').innerHTML = daily.map(q => `
    <div class="quest-card ${q.done ? 'done' : ''}" data-id="${q.id}" onclick="if(!${q.done}) startCountdown(${q.id})">
      <div class="q-check">${q.done ? '✓' : ''}</div>
      <div class="q-body"><div class="quest-name">${q.name}</div></div>
      <div class="q-xp">+${q.xp}</div>
      ${!q.done ? `<div class="screw-it-btn" onclick="event.stopPropagation(); screwIt(${q.id})">50%</div>` : ''}
      <div class="q-delete" onclick="event.stopPropagation(); deleteQuest(${q.id})">✕</div>
    </div>
  `).join('');
  if (!daily.length) document.getElementById('dailyQuests').innerHTML = '<div class="empty-state">No daily quests. Add one.</div>';
  
  document.getElementById('otherQuests').innerHTML = other.map(q => `
    <div class="quest-card ${q.done ? 'done' : ''}" data-id="${q.id}" onclick="if(!${q.done}) completeQuest(${q.id})">
      <div class="q-check">${q.done ? '✓' : ''}</div>
      <div class="q-body"><div class="quest-name">${q.name}</div></div>
      <div class="q-xp">+${q.xp}</div>
      <div class="q-delete" onclick="event.stopPropagation(); deleteQuest(${q.id})">✕</div>
    </div>
  `).join('');
  if (!other.length) document.getElementById('otherQuests').innerHTML = '<div class="empty-state">No main quests. Add one.</div>';
}

function deleteQuest(id) {
  if (confirm('Delete this quest?')) {
    S.quests = S.quests.filter(q => q.id !== id);
    renderQuests();
    saveToLocal();
    showToast('Quest deleted');
  }
}

// ===== STATS =====
function renderStats() {
  document.getElementById('statsRow').innerHTML = Object.entries(S.stats).map(([k,v]) => `
    <div class="stat-pill"><div class="stat-lbl">${k.toUpperCase()}</div><div class="stat-val">${v}</div></div>
  `).join('');
}

// ===== REFLECTION & SEAL =====
function sealDay() {
  const today = getToday();
  if (S.lastSealDate === today) {
    showToast('Already sealed today! Come back tomorrow.');
    return;
  }
  
  const ref1 = document.getElementById('reflection1').value.trim();
  const ref2 = document.getElementById('reflection2').value.trim();
  const ref3 = document.getElementById('reflection3').value.trim();
  
  if (!ref1 && !ref2 && !ref3) {
    showToast('Write at least one reflection before sealing');
    return;
  }
  
  let bonus = 0;
  if (ref1) bonus += 20;
  if (ref2) bonus += 15;
  if (ref3) bonus += 10;
  
  const totalEarned = S.todayXP + bonus;
  
  S.totalXP += totalEarned;
  S.lastSealDate = today;
  
  // Reset for tomorrow
  S.todayXP = 0;
  S.stamps = 0;
  S.quests.forEach(q => { if (q.type === 'daily') q.done = false; });
  
  document.getElementById('reflectionFeedback').innerHTML = `
    <div style="background:rgba(61,220,132,0.15); border:1px solid var(--success); border-radius:10px; padding:12px">
      <strong>✓ Day Sealed!</strong><br>
      Quest XP: ${S.todayXP - bonus}+<br>
      Reflection bonus: +${bonus}<br>
      <strong>Total: +${totalEarned} XP</strong>
    </div>
  `;
  
  document.getElementById('reflection1').value = '';
  document.getElementById('reflection2').value = '';
  document.getElementById('reflection3').value = '';
  
  renderQuests();
  renderStamps();
  document.getElementById('todayXP').textContent = '0';
  drawProgressRing(0);
  document.getElementById('nextMilestone').innerHTML = '⚡ Complete a quest to earn XP!';
  
  saveToLocal();
  syncToCloud();
  showToast(`✨ Day sealed! +${totalEarned} XP earned`);
  playSound('levelup');
  triggerConfetti();
}

// ===== LEVEL & XP =====
function getLevelXP(level) { return Math.round(500 * Math.pow(1.4, level - 1)); }

function recalcLevel() {
  let lvl = 1, rem = S.totalXP;
  while (lvl < 10 && rem >= getLevelXP(lvl)) { rem -= getLevelXP(lvl); lvl++; }
  S.level = lvl;
  document.getElementById('levelBadge').textContent = `LVL ${lvl}`;
  const ranks = ['', 'E·AWAKENING', 'E+·STIRRING', 'D·RISING', 'D+·FORGING', 'C·DRIVEN', 'C+·RELENTLESS', 'B·DISCIPLINED', 'B+·EXCEPTIONAL', 'A·SOVEREIGN', 'S·LEGEND'];
  document.getElementById('playerRank').textContent = ranks[lvl] || 'S·LEGEND';
  document.getElementById('playerName').textContent = S.playerName;
}

// ===== BODY DOUBLE =====
function startBodyDouble() {
  bodyDoubleInterval = setInterval(() => {
    const count = Math.floor(Math.random() * 50) + 10;
    document.getElementById('bodyDoubleBar').innerHTML = `👥 ${count} people focusing right now. You're not alone.`;
  }, 30000);
  document.getElementById('bodyDoubleBar').innerHTML = '👥 Loading focus partners...';
  setTimeout(() => {
    document.getElementById('bodyDoubleBar').innerHTML = `👥 ${Math.floor(Math.random() * 50) + 10} people focusing right now. You're not alone.`;
  }, 1000);
}

// ===== MODAL =====
function openModal(mode) {
  modalMode = mode;
  document.getElementById('modalTitle').textContent = 'Add Quest';
  document.getElementById('modalBody').innerHTML = `
    <input id="modalName" placeholder="Quest name">
    <select id="modalType">
      <option value="daily">Daily (resets tomorrow)</option>
      <option value="main">Main Quest</option>
      <option value="chaos">Chaos Quest</option>
    </select>
    <input id="modalXp" placeholder="XP reward" value="40" type="number">
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function confirmModal() {
  const name = document.getElementById('modalName')?.value;
  if (!name) return;
  const type = document.getElementById('modalType')?.value || 'daily';
  const xp = parseInt(document.getElementById('modalXp')?.value) || 40;
  
  S.quests.push({
    id: Date.now(),
    name: name,
    type: type,
    xp: xp,
    done: false,
    stats: [{ type: 'Discipline', value: 2 }]
  });
  
  closeModal();
  renderQuests();
  saveToLocal();
  showToast(`${name} added!`);
  playSound('click');
}

// ===== NAVIGATION =====
function showPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'quests') renderQuests();
}

// ===== STORAGE & SYNC =====
function saveToLocal() {
  localStorage.setItem('arise_adhd', JSON.stringify({
    totalXP: S.totalXP, level: S.level, streak: S.streak,
    playerName: S.playerName, stats: S.stats, quests: S.quests,
    todayXP: S.todayXP, lastSealDate: S.lastSealDate,
    weeklyXP: S.weeklyXP, weeklyTarget: S.weeklyTarget
  }));
}

function loadFromLocal() {
  const saved = localStorage.getItem('arise_adhd');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      S.totalXP = data.totalXP || 0;
      S.level = data.level || 1;
      S.streak = data.streak || 0;
      S.playerName = data.playerName || 'SEEKER';
      S.stats = data.stats || { Mind: 10, Discipline: 10, Body: 10, Awareness: 10, Strategy: 10 };
      S.quests = data.quests || [];
      S.todayXP = data.todayXP || 0;
      S.lastSealDate = data.lastSealDate || null;
      S.weeklyXP = data.weeklyXP || 0;
      S.weeklyTarget = data.weeklyTarget || 500;
    } catch(e) {}
  }
  
  if (!S.quests.length) {
    S.quests = [
      { id: 1, name: '🌅 Morning pages (5 min)', type: 'daily', xp: 25, done: false, stats: [{ type: 'Awareness', value: 2 }] },
      { id: 2, name: '📚 Study session (25 min)', type: 'daily', xp: 40, done: false, stats: [{ type: 'Mind', value: 2 }] },
      { id: 3, name: '🏃 Move body (15 min)', type: 'daily', xp: 35, done: false, stats: [{ type: 'Body', value: 3 }] },
      { id: 4, name: '⚡ Deep work (one pomodoro)', type: 'main', xp: 60, done: false, stats: [{ type: 'Discipline', value: 3 }] }
    ];
  }
}

async function syncToCloud() {
  if (!currentUser) return;
  const dot = document.getElementById('syncDot');
  if (dot) dot.style.background = '#ff9050';
  try {
    await supabase.from('user_data').upsert({
      user_id: currentUser.id,
      data: { totalXP: S.totalXP, streak: S.streak, playerName: S.playerName, stats: S.stats, quests: S.quests, todayXP: S.todayXP, lastSealDate: S.lastSealDate, weeklyXP: S.weeklyXP },
      updated_at: new Date()
    });
    if (dot) dot.classList.add('synced');
    setTimeout(() => { if(dot) dot.classList.remove('synced'); }, 2000);
  } catch(e) {}
}

async function loadFromCloud() {
  if (!currentUser) return;
  try {
    const { data } = await supabase.from('user_data').select('data').eq('user_id', currentUser.id).single();
    if (data?.data) {
      S.totalXP = data.data.totalXP || 0;
      S.streak = data.data.streak || 0;
      S.playerName = data.data.playerName || 'SEEKER';
      S.stats = data.data.stats || S.stats;
      S.quests = data.data.quests || S.quests;
      S.todayXP = data.data.todayXP || 0;
      S.lastSealDate = data.data.lastSealDate || null;
      S.weeklyXP = data.data.weeklyXP || 0;
      renderQuests();
    }
  } catch(e) {}
}

// ===== AUTH =====
async function handleAuth() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errorDiv = document.getElementById('loginError');
  if (!email || !password) { errorDiv.textContent = 'Email and password required'; return; }
  
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '...';
  
  try {
    let result;
    if (authMode === 'signup') {
      result = await supabase.auth.signUp({ email, password });
      if (result.error) throw result.error;
      if (result.data.user && !result.data.session) {
        errorDiv.style.color = '#3ddc84';
        errorDiv.textContent = 'Check your email to confirm!';
        btn.disabled = false; btn.textContent = 'SIGN IN';
        return;
      }
    } else {
      result = await supabase.auth.signInWithPassword({ email, password });
      if (result.error) throw result.error;
    }
    
    currentUser = result.data.user;
    await loadFromCloud();
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    recalcLevel();
    renderStats();
    renderQuests();
    renderStamps();
    drawProgressRing((S.todayXP / DAILY_GOAL) * 100);
    document.getElementById('todayXP').textContent = S.todayXP;
    document.getElementById('streakPill').textContent = `🔥 ${S.streak} day streak`;
    startBodyDouble();
    showToast(`Welcome back, ${S.playerName}`);
  } catch (err) { errorDiv.textContent = err.message; }
  btn.disabled = false; btn.textContent = authMode === 'signin' ? 'SIGN IN' : 'CREATE ACCOUNT';
}

function switchAuthMode() {
  authMode = authMode === 'signin' ? 'signup' : 'signin';
  const btn = document.getElementById('loginBtn');
  const switchText = document.querySelector('.login-switch');
  if (authMode === 'signup') { btn.textContent = 'CREATE ACCOUNT'; switchText.innerHTML = 'Already have an account? <span>Sign in</span>'; }
  else { btn.textContent = 'SIGN IN'; switchText.innerHTML = 'New here? <span>Create account</span>'; }
  document.getElementById('loginError').textContent = '';
}

async function signOut() {
  await supabase.auth.signOut();
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginOverlay').style.display = 'flex';
  if (bodyDoubleInterval) clearInterval(bodyDoubleInterval);
  showToast('Signed out');
}

function saveGeminiKey() {
  const key = document.getElementById('geminiKeyInput').value;
  if (key) { localStorage.setItem('gemini-key', key); showToast('API key saved'); }
}

// ===== MIDNIGHT RESET =====
function scheduleMidnightReset() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  setTimeout(() => {
    S.quests.forEach(q => { if (q.type === 'daily') q.done = false; });
    S.todayXP = 0;
    S.stamps = 0;
    renderQuests();
    renderStamps();
    document.getElementById('todayXP').textContent = '0';
    drawProgressRing(0);
    saveToLocal();
    showToast('🌙 New day! Daily quests reset.');
    scheduleMidnightReset();
  }, midnight - now);
}

// ===== INIT =====
async function init() {
  loadFromLocal();
  recalcLevel();
  renderStats();
  renderQuests();
  renderStamps();
  drawProgressRing((S.todayXP / DAILY_GOAL) * 100);
  document.getElementById('todayXP').textContent = S.todayXP;
  document.getElementById('streakPill').textContent = `🔥 ${S.streak} day streak`;
  initAudio();
  scheduleMidnightReset();
  
  const { data: { session } } = await supabase.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    await loadFromCloud();
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    startBodyDouble();
  }
  
  document.getElementById('loginBtn').onclick = handleAuth;
  document.getElementById('loginSwitch').onclick = switchAuthMode;
  
  setInterval(() => { if (currentUser) syncToCloud(); }, 30000);
}

init();

// Expose globals
window.completeQuest = completeQuest;
window.startCountdown = startCountdown;
window.screwIt = screwIt;
window.deleteQuest = deleteQuest;
window.openModal = openModal;
window.closeModal = closeModal;
window.confirmModal = confirmModal;
window.sealDay = sealDay;
window.showPanel = showPanel;
window.syncToCloud = syncToCloud;
window.signOut = signOut;
window.saveGeminiKey = saveGeminiKey;
</script>
